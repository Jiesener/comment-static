<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>提交内容 - 评论助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .container {
            background: white;
            padding: 30px 24px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 22px;
            text-align: center;
        }
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .status-item {
            background: #f8f9fa;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: #666;
        }
        .status-item strong { color: #11998e; }
        .message {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            font-size: 15px;
            animation: fadeIn 0.3s ease;
        }
        .message.success { background: #d4edda; color: #155724; }
        .message.error { background: #f8d7da; color: #721c24; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        textarea {
            width: 100%;
            min-height: 180px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            line-height: 1.6;
            resize: vertical;
            margin-bottom: 16px;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        textarea:focus {
            outline: none;
            border-color: #11998e;
        }
        .hint {
            color: #888;
            font-size: 13px;
            margin-bottom: 16px;
            text-align: center;
            line-height: 1.5;
        }
        button {
            width: 100%;
            padding: 15px 30px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .nav-links a {
            color: #888;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: #11998e; }
        .line-count {
            text-align: right;
            font-size: 12px;
            color: #aaa;
            margin-top: -12px;
            margin-bottom: 16px;
        }
        .sync-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 1000;
        }
        .sync-badge.success { background: #27ae60; }
        .sync-badge.error { background: #e74c3c; }
        .sync-badge.loading { background: #f39c12; }
        @media (max-width: 400px) {
            .container { padding: 20px 16px; }
            h1 { font-size: 20px; }
            button { font-size: 15px; padding: 14px 20px; }
        }
    </style>
</head>
<body>
    <div class="sync-badge" id="syncBadge">☁ 同步中...</div>

    <div class="container">
        <h1>📝 提交内容</h1>

        <div class="status-bar">
            <span class="status-item">📌 当前 <strong id="currentCount">0</strong> 条</span>
            <span class="status-item">⚠️ 提交将替换所有旧内容</span>
        </div>

        <div class="message" id="message" style="display: none;"></div>

        <textarea id="commentsInput" placeholder="输入多条内容，每行一条&#10;例如：&#10;这条评论说的太对了&#10;支持！说的好&#10;学到了，感谢分享" required></textarea>
        <div class="line-count" id="lineCount">0 行</div>

        <div class="hint">
            💡 每行一条内容，提交后会<strong>替换</strong>所有旧内容<br>
            每条最多500字
        </div>

        <button type="button" id="submitBtn" onclick="submitComments()">📤 提交内容</button>

        <div class="nav-links">
            <a href="index.html">← 去复制</a>
            <a href="#" onclick="clearInput()">🗑 清空</a>
        </div>
    </div>

    <script>
        // ========== 配置 ==========
        const STORAGE_KEY = 'plzs_comments';
        const JSONBIN_API_KEY = '$2a$10$hj2L8dQlL6o5l8zMYi9dP.n3ILlEpJU14/irLt8TA9QI9AMiivvi6';
        // 固定的 binId - 所有设备共用这个 ID，实现真正的多设备同步
        const FIXED_BIN_ID = '6a4270e3f5f4af5e2941a479';
        // ==========================

        // ========== JSONBin 云同步 ==========
        async function cloudLoad() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${FIXED_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                if (!response.ok) throw new Error('加载失败');
                const result = await response.json();
                return result.record;
            } catch (e) {
                console.error('云加载失败:', e);
                return null;
            }
        }

        async function cloudSave(data) {
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${FIXED_BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify({ comments: data, timestamp: Date.now() })
                });
                return true;
            } catch (e) {
                console.error('云保存失败:', e);
                return false;
            }
        }

        // ========== 本地存储 ==========
        function getComments() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            } catch (e) {
                return [];
            }
        }

        function saveComments(comments) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(comments));
        }

        // ========== UI ==========
        function showSyncBadge(text, type) {
            const badge = document.getElementById('syncBadge');
            badge.textContent = text;
            badge.className = 'sync-badge ' + type;
        }

        function updateCount() {
            const comments = getComments();
            document.getElementById('currentCount').textContent = comments.length;
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 3000);
        }

        const input = document.getElementById('commentsInput');
        const lineCount = document.getElementById('lineCount');

        input.addEventListener('input', function() {
            const lines = this.value.split('\n').filter(l => l.trim() !== '').length;
            lineCount.textContent = lines + ' 行';
        });

        async function submitComments() {
            const rawComments = input.value.split('\n');
            const comments = [];

            for (const line of rawComments) {
                const trimmed = line.trim();
                if (trimmed.length > 0) {
                    comments.push(trimmed.substring(0, 500));
                }
            }

            if (comments.length === 0) {
                showMessage('❌ 请输入至少一条内容', 'error');
                return;
            }

            showSyncBadge('☁ 同步中...', 'loading');
            saveComments(comments);
            await cloudSave(comments);
            showSyncBadge('☁ 已同步', 'success');

            showMessage(`✅ 成功提交 ${comments.length} 条内容！`, 'success');
            input.value = '';
            lineCount.textContent = '0 行';
            updateCount();
        }

        function clearInput() {
            if (input.value && !confirm('确定清空输入内容？')) return;
            input.value = '';
            lineCount.textContent = '0 行';
            input.focus();
        }

        // ========== 初始化 ==========
        async function init() {
            showSyncBadge('☁ 同步中...', 'loading');
            
            // 从云端加载数据
            const cloud = await cloudLoad();
            if (cloud && cloud.comments) {
                saveComments(cloud.comments);
            } else {
                const localData = getComments();
                if (localData.length > 0) {
                    await cloudSave(localData);
                }
            }
            
            showSyncBadge('☁ 已同步', 'success');
            updateCount();
        }

        init();
    </script>
</body>
</html>
