<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>提交内容 - 评论助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .container {
            background: white; padding: 30px 24px; border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 500px; width: 100%;
        }
        h1 { color: #333; margin-bottom: 8px; font-size: 22px; text-align: center; }
        .status-bar { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .status-item { background: #f8f9fa; padding: 6px 14px; border-radius: 20px; font-size: 13px; color: #666; }
        .status-item strong { color: #11998e; }
        .message {
            padding: 14px 16px; border-radius: 12px; margin-bottom: 20px;
            text-align: center; font-weight: 600; font-size: 15px;
        }
        .message.success { background: #d4edda; color: #155724; }
        .message.error { background: #f8d7da; color: #721c24; }
        textarea {
            width: 100%; min-height: 180px; padding: 15px;
            border: 2px solid #e0e0e0; border-radius: 12px;
            font-size: 16px; line-height: 1.6; resize: vertical;
            margin-bottom: 16px; font-family: inherit;
        }
        textarea:focus { outline: none; border-color: #11998e; }
        .hint { color: #888; font-size: 13px; margin-bottom: 16px; text-align: center; line-height: 1.5; }
        button {
            width: 100%; padding: 15px 30px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white; border: none; border-radius: 12px;
            font-size: 17px; font-weight: 600; cursor: pointer;
        }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .nav-links { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .nav-links a { color: #888; text-decoration: none; font-size: 14px; }
        .nav-links a:hover { color: #11998e; }
        .line-count { text-align: right; font-size: 12px; color: #aaa; margin-top: -12px; margin-bottom: 16px; }
        .sync-badge {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.7); color: white;
            padding: 8px 16px; border-radius: 20px; font-size: 12px; z-index: 1000;
        }
        .sync-badge.success { background: #27ae60; }
        .sync-badge.error { background: #e74c3c; }
        .sync-badge.loading { background: #f39c12; }
    </style>
</head>
<body>
    <div class="sync-badge" id="syncBadge">☁ 准备中...</div>

    <div class="container">
        <h1>📝 提交内容</h1>
        <div class="status-bar">
            <span class="status-item">📌 云端当前 <strong id="currentCount">0</strong> 条</span>
            <span class="status-item">⚠️ 提交将<strong>替换</strong>所有旧内容</span>
        </div>
        <div class="message" id="message" style="display: none;"></div>
        <textarea id="commentsInput" placeholder="输入多条内容，每行一条&#10;例如：&#10;这条评论说的太对了&#10;支持！说的好" required></textarea>
        <div class="line-count" id="lineCount">0 行</div>
        <div class="hint">💡 每行一条内容，提交后会<strong>替换</strong>云端所有旧内容</div>
        <button type="button" id="submitBtn" onclick="doSubmit()">📤 提交内容</button>
        <div class="nav-links">
            <a href="index.html">← 去展示</a>
        </div>
    </div>

    <script>
        var STORAGE_KEY = 'plzs_comments';
        var API_KEY = '$2a$10$hj2L8dQlL6o5l8zMYi9dP.n3ILlEpJU14/irLt8TA9QI9AMiivvi6';
        var BIN_ID = '6a4270e3f5f4af5e2941a479';

        function showBadge(text, type) {
            var b = document.getElementById('syncBadge');
            b.textContent = text;
            b.className = 'sync-badge ' + type;
        }

        function showMessage(text, type) {
            var m = document.getElementById('message');
            m.textContent = text;
            m.className = 'message ' + type;
            m.style.display = 'block';
            setTimeout(function() { m.style.display = 'none'; }, 5000);
        }

        function cloudLoad() {
            return fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest', {
                headers: { 'X-Master-Key': API_KEY }
            }).then(function(r) { return r.json(); })
              .then(function(d) { return d.record; })
              .catch(function(e) { return null; });
        }

        function cloudSave(arr) {
            return fetch('https://api.jsonbin.io/v3/b/' + BIN_ID, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify({ comments: arr, timestamp: Date.now() })
            }).then(function(r) {
                if (!r.ok) throw new Error('保存失败: ' + r.status);
                return r.json();
            }).then(function(d) {
                return true;
            });
        }

        function doSubmit() {
            var raw = document.getElementById('commentsInput').value.split('\n');
            var comments = [];
            for (var i = 0; i < raw.length; i++) {
                var t = raw[i].trim();
                if (t.length > 0) comments.push(t.substring(0, 500));
            }
            if (comments.length === 0) {
                showMessage('❌ 请输入至少一条内容', 'error');
                return;
            }

            var btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 正在保存到云端...';
            showBadge('☁ 保存中...', 'loading');

            cloudSave(comments).then(function() {
                showBadge('☁ 已同步', 'success');
                showMessage('✅ 成功提交 ' + comments.length + ' 条内容！（已保存到云端）', 'success');
                document.getElementById('commentsInput').value = '';
                document.getElementById('lineCount').textContent = '0 行';
                updateCount();
                btn.disabled = false;
                btn.textContent = '📤 提交内容';
            }).catch(function(e) {
                showBadge('☁ 保存失败', 'error');
                showMessage('❌ 保存失败: ' + e.message + '，请重试', 'error');
                btn.disabled = false;
                btn.textContent = '📤 提交内容';
            });
        }

        function updateCount() {
            showBadge('☁ 读取中...', 'loading');
            cloudLoad().then(function(data) {
                var count = (data && data.comments) ? data.comments.length : 0;
                document.getElementById('currentCount').textContent = count;
                showBadge('☁ 已同步 (' + count + '条)', 'success');
            });
        }

        document.getElementById('commentsInput').addEventListener('input', function() {
            var lines = this.value.split('\n').filter(function(l) { return l.trim() !== ''; }).length;
            document.getElementById('lineCount').textContent = lines + ' 行';
        });

        // 初始化：只从云端读取当前数量，不覆盖本地输入
        updateCount();
    </script>
</body>
</html>
