<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>提交内容 - 评论助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .container {
            background: white;
            padding: 30px 24px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 22px;
            text-align: center;
        }
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .status-item {
            background: #f8f9fa;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: #666;
        }
        .status-item strong { color: #11998e; }
        .message {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            font-size: 15px;
            animation: fadeIn 0.3s ease;
        }
        .message.success { background: #d4edda; color: #155724; }
        .message.error { background: #f8d7da; color: #721c24; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        textarea {
            width: 100%;
            min-height: 180px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            line-height: 1.6;
            resize: vertical;
            margin-bottom: 16px;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        textarea:focus {
            outline: none;
            border-color: #11998e;
        }
        .hint {
            color: #888;
            font-size: 13px;
            margin-bottom: 16px;
            text-align: center;
            line-height: 1.5;
        }
        button {
            width: 100%;
            padding: 15px 30px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .nav-links a {
            color: #888;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: #11998e; }
        .line-count {
            text-align: right;
            font-size: 12px;
            color: #aaa;
            margin-top: -12px;
            margin-bottom: 16px;
        }
        .sync-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 1000;
        }
        .sync-badge.success { background: #27ae60; }
        .sync-badge.error { background: #e74c3c; }
        .sync-badge.loading { background: #f39c12; }
        @media (max-width: 400px) {
            .container { padding: 20px 16px; }
            h1 { font-size: 20px; }
            button { font-size: 15px; padding: 14px 20px; }
        }
    </style>
</head>
<body>
    <div class="sync-badge" id="syncBadge">☁ 同步中...</div>

    <div class="container">
        <h1>📝 提交内容</h1>

        <div class="status-bar">
            <span class="status-item">📌 当前 <strong id="currentCount">0</strong> 条</span>
            <span class="status-item">⚠️ 提交将替换所有旧内容</span>
        </div>

        <div class="message" id="message" style="display: none;"></div>

        <textarea id="commentsInput" placeholder="输入多条内容，每行一条&#10;例如：&#10;这条评论说的太对了&#10;支持！说的好&#10;学到了，感谢分享" required></textarea>
        <div class="line-count" id="lineCount">0 行</div>

        <div class="hint">
            💡 每行一条内容，提交后会<strong>替换</strong>所有旧内容<br>
            每条最多500字
        </div>

        <button type="button" id="submitBtn" onclick="submitComments()">📤 提交内容</button>

        <div class="nav-links">
            <a href="index.html">← 去复制</a>
            <a href="#" onclick="clearInput()">🗑 清空</a>
        </div>
    </div>

    <script>
        // ========== 配置 ==========
        const STORAGE_KEY = 'plzs_comments';
        const JSONBIN_API_KEY = '$2a$10$hj2L8dQlL6o5l8zMYi9dP.n3ILlEpJU14/irLt8TA9QI9AMiivvi6';
        const PASSWORD = 'handsomeby2gjcn';
        // ==========================

        let isLoggedIn = false;

        // ========== 加密/解密 ==========
        async function deriveKey(password, salt) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey(
                'raw', enc.encode(password), 'PBKDF2', false, ['deriveBits', 'deriveKey']
            );
            return crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
                keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
            );
        }

        async function encryptText(text, password) {
            const enc = new TextEncoder();
            const salt = crypto.getRandomValues(new Uint8Array(16));
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const key = await deriveKey(password, salt);
            const encrypted = await crypto.subtle.encrypt(
                { name: 'AES-GCM', iv }, key, enc.encode(text)
            );
            return JSON.stringify({
                salt: Array.from(salt),
                iv: Array.from(iv),
                data: Array.from(new Uint8Array(encrypted))
            });
        }

        async function decryptText(encryptedJson, password) {
            try {
                const { salt, iv, data } = JSON.parse(encryptedJson);
                const key = await deriveKey(password, new Uint8Array(salt));
                const decrypted = await crypto.subtle.decrypt(
                    { name: 'AES-GCM', iv: new Uint8Array(iv) }, key, new Uint8Array(data)
                );
                return new TextDecoder().decode(decrypted);
            } catch (e) {
                return null;
            }
        }

        // ========== JSONBin 云同步 ==========
        async function cloudLoad() {
            try {
                const binId = localStorage.getItem('comment_bin_id');
                if (!binId) return null;
                
                const response = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                if (!response.ok) throw new Error('加载失败');
                const result = await response.json();
                return result.record;
            } catch (e) {
                console.error('云加载失败:', e);
                return null;
            }
        }

        async function cloudSave(data) {
            try {
                const encrypted = await encryptText(JSON.stringify(data), PASSWORD);
                let binId = localStorage.getItem('comment_bin_id');
                
                if (!binId) {
                    const createResponse = await fetch('https://api.jsonbin.io/v3/b', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Master-Key': JSONBIN_API_KEY
                        },
                        body: JSON.stringify({ data: encrypted })
                    });
                    
                    if (createResponse.ok) {
                        const result = await createResponse.json();
                        binId = result.metadata.id;
                        localStorage.setItem('comment_bin_id', binId);
                    }
                } else {
                    await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Master-Key': JSONBIN_API_KEY
                        },
                        body: JSON.stringify({ data: encrypted })
                    });
                }
                
                return true;
            } catch (e) {
                console.error('云保存失败:', e);
                return false;
            }
        }

        // ========== 登录逻辑 ==========
        async function login() {
            const password = prompt('请输入访问密码：');
            if (password !== PASSWORD) {
                alert('密码错误！');
                return false;
            }

            showSyncBadge('☁ 同步中...', 'loading');
            
            const cloud = await cloudLoad();
            const localData = getComments();
            let finalData = localData;

            if (cloud) {
                const cloudData = JSON.parse(await decryptText(cloud.data, PASSWORD));
                if (cloudData.length > localData.length) {
                    finalData = cloudData;
                    saveComments(cloudData);
                } else if (localData.length > 0) {
                    await cloudSave(localData);
                }
            } else if (localData.length > 0) {
                await cloudSave(localData);
            }

            showSyncBadge('☁ 已同步', 'success');
            isLoggedIn = true;
            localStorage.setItem('comment_logged_in', 'true');
            updateCount();
            return true;
        }

        function showSyncBadge(text, type) {
            const badge = document.getElementById('syncBadge');
            badge.textContent = text;
            badge.className = 'sync-badge ' + type;
        }

        // ========== 本地存储 ==========
        function getComments() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            } catch (e) {
                return [];
            }
        }

        function saveComments(comments) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(comments));
        }

        // ========== UI ==========
        function updateCount() {
            const comments = getComments();
            document.getElementById('currentCount').textContent = comments.length;
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 3000);
        }

        const input = document.getElementById('commentsInput');
        const lineCount = document.getElementById('lineCount');

        input.addEventListener('input', function() {
            const lines = this.value.split('\n').filter(l => l.trim() !== '').length;
            lineCount.textContent = lines + ' 行';
        });

        async function submitComments() {
            const rawComments = input.value.split('\n');
            const comments = [];

            for (const line of rawComments) {
                const trimmed = line.trim();
                if (trimmed.length > 0) {
                    comments.push(trimmed.substring(0, 500));
                }
            }

            if (comments.length === 0) {
                showMessage('❌ 请输入至少一条内容', 'error');
                return;
            }

            showSyncBadge('☁ 同步中...', 'loading');
            saveComments(comments);
            await cloudSave(comments);
            showSyncBadge('☁ 已同步', 'success');

            showMessage(`✅ 成功提交 ${comments.length} 条内容！`, 'success');
            input.value = '';
            lineCount.textContent = '0 行';
            updateCount();
        }

        function clearInput() {
            if (input.value && !confirm('确定清空输入内容？')) return;
            input.value = '';
            lineCount.textContent = '0 行';
            input.focus();
        }

        // ========== 初始化 ==========
        async function init() {
            const loggedIn = localStorage.getItem('comment_logged_in');
            
            if (!loggedIn) {
                const success = await login();
                if (!success) return;
            } else {
                showSyncBadge('☁ 同步中...', 'loading');
                const cloud = await cloudLoad();
                if (cloud) {
                    const cloudData = JSON.parse(await decryptText(cloud.data, PASSWORD));
                    const localData = getComments();
                    
                    if (cloudData.length > localData.length) {
                        saveComments(cloudData);
                    } else if (localData.length > 0) {
                        await cloudSave(localData);
                    }
                }
                showSyncBadge('☁ 已同步', 'success');
            }
            
            updateCount();
        }

        init();
    </script>
</body>
</html>
