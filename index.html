<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>评论展示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.box{background:#fff;padding:30px 24px;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:500px;width:100%;text-align:center}
h1{color:#333;margin-bottom:12px;font-size:22px}
.info{font-size:12px;color:#aaa;margin-bottom:16px}
.badge{display:inline-block;background:rgba(102,126,234,.12);color:#667eea;font-size:13px;padding:4px 14px;border-radius:20px;margin-bottom:20px;font-weight:600}
textarea{width:100%;min-height:120px;padding:15px;border:2px solid #e0e0e0;border-radius:12px;font-size:16px;line-height:1.6;resize:none;margin-bottom:16px;font-family:inherit}
.btns{display:flex;gap:10px}
button{flex:1;padding:14px 20px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer}
button:active{transform:scale(.97)}
button.sec{background:#f0f0f0;color:#666;flex:.5}
button:disabled{opacity:.4;cursor:not-allowed}
.empty{color:#999;font-size:16px;padding:50px 0}
.empty p{margin-top:8px;font-size:14px}
.loading{color:#667eea;font-size:16px;padding:50px 0}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:#27ae60;color:#fff;padding:12px 24px;border-radius:10px;font-weight:600;font-size:15px;box-shadow:0 8px 30px rgba(0,0,0,.2);transition:transform .3s;z-index:999;opacity:0}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.nav{display:flex;justify-content:center;gap:20px;margin-top:20px}
.nav a{color:#888;text-decoration:none;font-size:14px}
.sync{position:fixed;bottom:20px;right:20px;background:rgba(0,0,0,.7);color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;z-index:1000}
.sync.ok{background:#27ae60}.sync.ld{background:#f39c12}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="sync" id="sync">☁ 就绪</div>
<div class="box">
<h1>📋 评论展示</h1>
<div class="info" id="info"></div>
<div class="badge">📌 剩余 <strong id="cnt">0</strong> 条</div>
<div id="area"><div class="loading">⏳ 加载中...</div></div>
<div class="nav"><a href="submit.html">去提交内容 →</a></div>
</div>

<script>
var FB_URL = 'https://comment-app-5a494-default-rtdb.firebaseio.com';
var DK = 'plzs_device_id';

var DEVID = localStorage.getItem(DK);
if (!DEVID) { DEVID = 'd' + Math.random().toString(36).slice(2, 8); localStorage.setItem(DK, DEVID); }
document.getElementById('info').textContent = '📱 ' + DEVID;

function showSync(t, c) { var e = document.getElementById('sync'); e.textContent = t; e.className = 'sync ' + c; }
function toast(t) { var e = document.getElementById('toast'); e.textContent = t; e.classList.add('show'); setTimeout(function() { e.classList.remove('show'); }, 1500); }
function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

// Firebase REST API
function fbLoad() {
    return fetch(FB_URL + '/data.json')
    .then(function(r) { return r.json(); })
    .then(function(d) {
        if (!d) return { comments: [], assignments: {} };
        return { comments: d.comments || [], assignments: d.assignments || {} };
    })
    .catch(function(e) { console.error('load error:', e); return null; });
}

function fbSave(data) {
    return fetch(FB_URL + '/data.json', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(function(r) { return r.json(); })
    .then(function() { return true; })
    .catch(function(e) { console.error('save error:', e); return false; });
}

var DATA = null, CUR = null, BUSY = false;

function render() {
    var b = document.getElementById('area'), c = document.getElementById('cnt');
    if (DATA) {
        var ac = Object.values(DATA.assignments || {});
        c.textContent = (DATA.comments || []).filter(function(x) { return ac.indexOf(x) < 0; }).length;
    }
    if (!CUR) {
        b.innerHTML = '<div class="empty"><div style="font-size:48px;margin-bottom:10px">📭</div><p>没有更多评论了</p></div>';
    } else {
        b.innerHTML = '<textarea id="ta" readonly>' + esc(CUR) + '</textarea><div class="btns"><button id="copyBtn">📋 复制</button><button class="sec" id="skipBtn">⏭ 跳过</button></div>';
        document.getElementById('copyBtn').onclick = doCopy;
        document.getElementById('skipBtn').onclick = doSkip;
    }
}

async function assign() {
    showSync('☁ 分配中...', 'ld');
    await sleep(100 + Math.random() * 300);

    var d = await fbLoad();
    if (!d) { showSync('⚠️ 加载失败', ''); return false; }
    DATA = d;

    var comments = DATA.comments || [];
    var assignments = DATA.assignments || {};

    var mine = assignments[DEVID];
    if (mine && comments.indexOf(mine) >= 0) {
        CUR = mine; render(); showSync('☁ 已同步', 'ok'); return true;
    }

    var ac = Object.values(assignments);
    var ua = comments.filter(function(x) { return ac.indexOf(x) < 0; });

    if (ua.length === 0) { CUR = null; render(); showSync('📭 已用完', 'ok'); return false; }

    var pick = ua[Math.floor(Math.random() * ua.length)];
    DATA.assignments[DEVID] = pick;
    await fbSave(DATA);

    CUR = pick;
    render();
    showSync('☁ 已同步', 'ok');
    return true;
}

async function doCopy() {
    if (BUSY || !CUR) return;
    BUSY = true;
    var btn = document.getElementById('copyBtn');
    if (btn) btn.disabled = true;

    var text = CUR;
    try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
        } else {
            var ta = document.getElementById('ta');
            if (ta) { ta.select(); document.execCommand('copy'); }
        }
        toast('✅ 已复制！');
    } catch (e) {
        toast('⚠️ 复制失败');
        BUSY = false; if (btn) btn.disabled = false; return;
    }

    showSync('☁ 保存中...', 'ld');
    var d = await fbLoad();
    if (d) {
        DATA = d;
        var idx = DATA.comments.indexOf(text);
        if (idx >= 0) DATA.comments.splice(idx, 1);
        delete DATA.assignments[DEVID];
        await fbSave(DATA);
    }

    CUR = null;
    await assign();
    BUSY = false;
}

async function doSkip() {
    if (BUSY) return;
    BUSY = true;
    showSync('☁ 跳过中...', 'ld');
    var d = await fbLoad();
    if (d) {
        DATA = d;
        delete DATA.assignments[DEVID];
        await fbSave(DATA);
    }
    CUR = null;
    toast('⏭ 已跳过');
    await assign();
    BUSY = false;
}

assign();

// 轮询同步
setInterval(async function() {
    if (BUSY) return;
    var d = await fbLoad();
    if (!d) return;
    var mine = d.assignments ? d.assignments[DEVID] : null;
    if (mine && d.comments && d.comments.indexOf(mine) >= 0) {
        if (mine !== CUR) { DATA = d; CUR = mine; render(); showSync('☁ 已同步', 'ok'); }
    } else if (!CUR) {
        DATA = d;
        var ac = Object.values(d.assignments || {});
        var ua = (d.comments || []).filter(function(x) { return ac.indexOf(x) < 0; });
        if (ua.length > 0) {
            CUR = ua[0];
            d.assignments[DEVID] = CUR;
            fbSave(d);
            render();
            showSync('☁ 已同步', 'ok');
        }
    }
}, 2000);
</script>
</body>
</html>
