<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>复制评论 - 评论助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .container {
            background: white;
            padding: 30px 24px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 22px;
        }
        .count-badge {
            display: inline-block;
            background: #667eea20;
            color: #667eea;
            font-size: 13px;
            padding: 4px 14px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            line-height: 1.6;
            resize: none;
            margin-bottom: 16px;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 14px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        button:active {
            transform: scale(0.97);
        }
        button.secondary {
            background: #f0f0f0;
            color: #666;
            flex: 0.5;
        }
        .empty {
            color: #999;
            font-size: 16px;
            padding: 50px 0;
        }
        .empty p { margin-top: 8px; font-size: 14px; }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: #27ae60;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
            z-index: 999;
            opacity: 0;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .nav-links a {
            color: #888;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: #667eea; }
        .sync-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 1000;
        }
        .sync-badge.success { background: #27ae60; }
        .sync-badge.error { background: #e74c3c; }
        .sync-badge.loading { background: #f39c12; }
        @media (max-width: 400px) {
            .container { padding: 20px 16px; }
            h1 { font-size: 20px; }
            button { font-size: 15px; padding: 12px 16px; }
            textarea { min-height: 100px; }
        }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="sync-badge" id="syncBadge">☁ 同步中...</div>

    <div class="container">
        <h1>📋 复制评论</h1>
        <div class="count-badge" id="countBadge">
            📌 剩余 <strong id="remainingCount">0</strong> 条
        </div>

        <div id="contentArea">
            <!-- 动态内容 -->
        </div>

        <div class="nav-links">
            <a href="submit.html">去提交内容 →</a>
        </div>
    </div>

    <script>
        // ========== 配置 ==========
        const STORAGE_KEY = 'plzs_comments';
        const JSONBIN_API_KEY = '$2a$10$hj2L8dQlL6o5l8zMYi9dP.n3ILlEpJU14/irLt8TA9QI9AMiivvi6';
        const JSONBIN_BIN_ID = '68623f8f8563633d2226ab13'; // 会动态创建
        const PASSWORD = 'handsomeby2gjcn';
        // ==========================

        let isLoggedIn = false;
        let cloudData = null;

        // ========== 加密/解密 ==========
        async function deriveKey(password, salt) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey(
                'raw', enc.encode(password), 'PBKDF2', false, ['deriveBits', 'deriveKey']
            );
            return crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
                keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
            );
        }

        async function encryptText(text, password) {
            const enc = new TextEncoder();
            const salt = crypto.getRandomValues(new Uint8Array(16));
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const key = await deriveKey(password, salt);
            const encrypted = await crypto.subtle.encrypt(
                { name: 'AES-GCM', iv }, key, enc.encode(text)
            );
            return JSON.stringify({
                salt: Array.from(salt),
                iv: Array.from(iv),
                data: Array.from(new Uint8Array(encrypted))
            });
        }

        async function decryptText(encryptedJson, password) {
            try {
                const { salt, iv, data } = JSON.parse(encryptedJson);
                const key = await deriveKey(password, new Uint8Array(salt));
                const decrypted = await crypto.subtle.decrypt(
                    { name: 'AES-GCM', iv: new Uint8Array(iv) }, key, new Uint8Array(data)
                );
                return new TextDecoder().decode(decrypted);
            } catch (e) {
                return null;
            }
        }

        // ========== JSONBin 云同步 ==========
        async function cloudLoad() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                if (!response.ok) throw new Error('加载失败');
                const result = await response.json();
                return result.record;
            } catch (e) {
                console.error('云加载失败:', e);
                return null;
            }
        }

        async function cloudSave(data) {
            try {
                // 先加密数据
                const encrypted = await encryptText(JSON.stringify(data), PASSWORD);
                
                // 检查bin是否存在，不存在则创建
                let binId = localStorage.getItem('comment_bin_id');
                
                if (!binId) {
                    // 创建新的bin
                    const createResponse = await fetch('https://api.jsonbin.io/v3/b', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Master-Key': JSONBIN_API_KEY
                        },
                        body: JSON.stringify({ data: encrypted })
                    });
                    
                    if (createResponse.ok) {
                        const result = await createResponse.json();
                        binId = result.metadata.id;
                        localStorage.setItem('comment_bin_id', binId);
                        // 更新URL中的bin id
                        JSONBIN_BIN_ID = binId;
                    }
                } else {
                    // 更新已有的bin
                    await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Master-Key': JSONBIN_API_KEY
                        },
                        body: JSON.stringify({ data: encrypted })
                    });
                }
                
                return true;
            } catch (e) {
                console.error('云保存失败:', e);
                return false;
            }
        }

        // ========== 登录逻辑 ==========
        async function login() {
            const password = prompt('请输入访问密码：');
            if (password !== PASSWORD) {
                alert('密码错误！');
                return false;
            }

            showSyncBadge('☁ 同步中...', 'loading');

            // 加载云端数据
            const cloud = await cloudLoad();
            cloudData = cloud ? JSON.parse(await decryptText(cloud.data, PASSWORD)) : [];
            const localData = getComments();

            // 用数量多的那个
            if (cloudData.length > localData.length) {
                saveComments(cloudData);
                showSyncBadge('☁ 已同步', 'success');
            } else if (localData.length > 0) {
                await cloudSave(localData);
                showSyncBadge('☁ 已同步', 'success');
            } else {
                showSyncBadge('☁ 已同步', 'success');
            }

            isLoggedIn = true;
            localStorage.setItem('comment_logged_in', 'true');
            return true;
        }

        function showSyncBadge(text, type) {
            const badge = document.getElementById('syncBadge');
            badge.textContent = text;
            badge.className = 'sync-badge ' + type;
        }

        // ========== 本地存储 ==========
        function getComments() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            } catch (e) {
                return [];
            }
        }

        function saveComments(comments) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(comments));
        }

        // ========== UI ==========
        function showToast(text, isError) {
            const toast = document.getElementById('toast');
            toast.textContent = text;
            toast.style.background = isError ? '#e74c3c' : '#27ae60';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
        }

        async function copyComment() {
            const textArea = document.getElementById('commentText');
            if (!textArea) return;

            const text = textArea.value;

            const copyDone = async () => {
                showToast('✅ 已复制！');
                setTimeout(async () => {
                    const comments = getComments();
                    if (comments.length > 0) {
                        comments.shift();
                        saveComments(comments);
                        await cloudSave(comments); // 同步到云端
                    }
                    loadNext();
                }, 600);
            };

            const copyFail = () => {
                fallbackCopy(textArea, copyDone);
            };

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(copyDone).catch(copyFail);
            } else {
                fallbackCopy(textArea, copyDone);
            }
        }

        function fallbackCopy(textArea, onSuccess) {
            textArea.select();
            textArea.setSelectionRange(0, 99999);
            if (document.execCommand('copy')) {
                onSuccess();
            } else {
                alert('复制失败，请手动选中文字后复制');
                textArea.select();
            }
        }

        async function skipComment() {
            const comments = getComments();
            if (comments.length > 0) {
                comments.shift();
                saveComments(comments);
                await cloudSave(comments); // 同步到云端
            }
            showToast('⏭ 已跳过', false);
            setTimeout(() => loadNext(), 400);
        }

        function loadNext() {
            const comments = getComments();
            const contentArea = document.getElementById('contentArea');
            const remainingCount = document.getElementById('remainingCount');

            remainingCount.textContent = comments.length;

            if (comments.length === 0) {
                contentArea.innerHTML = `
                    <div class="empty">
                        <div style="font-size: 48px; margin-bottom: 10px;">📭</div>
                        <p>当前没有内容了</p>
                        <p style="font-size: 14px;">去"提交内容"页面添加新内容</p>
                    </div>
                `;
            } else {
                contentArea.innerHTML = `
                    <textarea id="commentText" readonly>${escapeHtml(comments[0])}</textarea>
                    <div class="btn-group">
                        <button onclick="copyComment()">📋 复制</button>
                        <button class="secondary" onclick="skipComment()">⏭ 跳过</button>
                    </div>
                `;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== 键盘快捷键 ==========
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                if (e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'INPUT') {
                    e.preventDefault();
                    copyComment();
                }
            }
        });

        // ========== 初始化 ==========
        async function init() {
            // 检查是否已登录
            const loggedIn = localStorage.getItem('comment_logged_in');
            
            if (!loggedIn) {
                const success = await login();
                if (!success) return;
            } else {
                // 已登录，直接加载数据
                showSyncBadge('☁ 同步中...', 'loading');
                const cloud = await cloudLoad();
                if (cloud) {
                    cloudData = JSON.parse(await decryptText(cloud.data, PASSWORD));
                    const localData = getComments();
                    
                    if (cloudData.length > localData.length) {
                        saveComments(cloudData);
                    } else if (localData.length > 0) {
                        await cloudSave(localData);
                    }
                }
                showSyncBadge('☁ 已同步', 'success');
            }
            
            loadNext();
        }

        // 启动
        init();
    </script>
</body>
</html>
