<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>评论展示 - 评论助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .container {
            background: white; padding: 30px 24px; border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 500px; width: 100%;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 8px; font-size: 22px; }
        .count-badge {
            display: inline-block; background: #667eea20; color: #667eea;
            font-size: 13px; padding: 4px 14px; border-radius: 20px;
            margin-bottom: 20px; font-weight: 600;
        }
        textarea {
            width: 100%; min-height: 120px; padding: 15px;
            border: 2px solid #e0e0e0; border-radius: 12px;
            font-size: 16px; line-height: 1.6; resize: none;
            margin-bottom: 16px; font-family: inherit;
        }
        textarea:focus { outline: none; border-color: #667eea; }
        .btn-group { display: flex; gap: 10px; }
        button {
            flex: 1; padding: 14px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
        }
        button:active { transform: scale(0.97); }
        button.secondary { background: #f0f0f0; color: #666; flex: 0.5; }
        .empty { color: #999; font-size: 16px; padding: 50px 0; }
        .empty p { margin-top: 8px; font-size: 14px; }
        .toast {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: #27ae60; color: white; padding: 12px 24px;
            border-radius: 10px; font-weight: 600; font-size: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease; z-index: 999; opacity: 0;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .nav-links { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .nav-links a { color: #888; text-decoration: none; font-size: 14px; }
        .nav-links a:hover { color: #667eea; }
        .sync-badge {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.7); color: white;
            padding: 8px 16px; border-radius: 20px; font-size: 12px; z-index: 1000;
        }
        .sync-badge.success { background: #27ae60; }
        .sync-badge.error { background: #e74c3c; }
        .sync-badge.loading { background: #f39c12; }
        .sync-badge.syncing { background: #3498db; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="sync-badge" id="syncBadge">☁ 同步中...</div>

    <div class="container">
        <h1>📋 评论展示</h1>
        <div class="count-badge">
            📌 剩余 <strong id="remainingCount">0</strong> 条
        </div>
        <div id="contentArea"></div>
        <div class="nav-links">
            <a href="submit.html">去提交内容 →</a>
        </div>
    </div>

    <script>
        var STORAGE_KEY = 'plzs_comments';
        var API_KEY = '$2a$10$hj2L8dQlL6o5l8zMYi9dP.n3ILlEpJU14/irLt8TA9QI9AMiivvi6';
        var BIN_ID = '6a4270e3f5f4af5e2941a479';
        var lastCloudTimestamp = 0;  // 记录上次云端数据的时间戳
        var isSyncing = false;  // 防止并发同步

        function showBadge(text, type) {
            var b = document.getElementById('syncBadge');
            b.textContent = text;
            b.className = 'sync-badge ' + type;
        }

        function showToast(text) {
            var t = document.getElementById('toast');
            t.textContent = text;
            t.classList.add('show');
            setTimeout(function() { t.classList.remove('show'); }, 1500);
        }

        function getLocal() {
            try {
                var d = localStorage.getItem(STORAGE_KEY);
                return d ? JSON.parse(d) : [];
            } catch(e) { return []; }
        }

        function saveLocal(arr) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
        }

        // 从云端读取（每次都读最新的）
        function cloudLoad() {
            return fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest', {
                headers: { 'X-Master-Key': API_KEY }
            }).then(function(r) {
                return r.json();
            }).then(function(d) {
                return d.record;
            }).catch(function(e) {
                return null;
            });
        }

        // 保存到云端
        function cloudSave(arr) {
            return fetch('https://api.jsonbin.io/v3/b/' + BIN_ID, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': API_KEY
                },
                body: JSON.stringify({ comments: arr, timestamp: Date.now() })
            }).then(function(r) {
                return r.json();
            }).then(function(d) {
                lastCloudTimestamp = d.record ? d.record.timestamp : Date.now();
                return true;
            }).catch(function() {
                return false;
            });
        }

        function escapeHtml(text) {
            var d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function loadNext() {
            var comments = getLocal();
            var area = document.getElementById('contentArea');
            var count = document.getElementById('remainingCount');
            count.textContent = comments.length;

            if (comments.length === 0) {
                area.innerHTML = '<div class="empty"><div style="font-size:48px;margin-bottom:10px">📭</div><p>当前没有内容了</p><p style="font-size:14px">等待其他人提交新内容...</p></div>';
            } else {
                area.innerHTML = '<textarea id="commentText" readonly>' + escapeHtml(comments[0]) + '</textarea><div class="btn-group"><button onclick="doCopy()">📋 复制</button><button class="secondary" onclick="doSkip()">⏭ 跳过</button></div>';
            }
        }

        // 从云端同步到本地（核心逻辑）
        function syncFromCloud() {
            if (isSyncing) return;
            isSyncing = true;

            cloudLoad().then(function(cloudData) {
                if (cloudData && cloudData.comments) {
                    var cloudTs = cloudData.timestamp || 0;
                    var localData = getLocal();

                    // 云端有更新，或者本地为空，用云端数据
                    if (cloudTs > lastCloudTimestamp || localData.length === 0) {
                        if (JSON.stringify(cloudData.comments) !== JSON.stringify(localData)) {
                            saveLocal(cloudData.comments);
                            loadNext();
                        }
                        lastCloudTimestamp = cloudTs;
                    }
                }
                isSyncing = false;
            }).catch(function() {
                isSyncing = false;
            });
        }

        function doCopy() {
            var ta = document.getElementById('commentText');
            if (!ta) return;
            var text = ta.value;

            function afterCopy() {
                showToast('✅ 已复制！');
                var comments = getLocal();
                if (comments.length > 0) {
                    comments.shift();
                    saveLocal(comments);
                    cloudSave(comments).then(function() {
                        loadNext();
                    });
                } else {
                    loadNext();
                }
            }

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(afterCopy).catch(function() {
                    ta.select(); document.execCommand('copy'); afterCopy();
                });
            } else {
                ta.select(); document.execCommand('copy'); afterCopy();
            }
        }

        function doSkip() {
            var comments = getLocal();
            if (comments.length > 0) {
                comments.shift();
                saveLocal(comments);
                cloudSave(comments).then(function() {
                    loadNext();
                });
            }
            showToast('⏭ 已跳过');
        }

        // ========== 初始化 + 轮询 ==========
        // 首次加载
        showBadge('☁ 同步中...', 'loading');
        syncFromCloud();

        // 每3秒轮询一次云端，实现多设备实时同步
        setInterval(function() {
            showBadge('🔄 同步中...', 'syncing');
            syncFromCloud().then(function() {
                showBadge('☁ 已同步', 'success');
            });
        }, 3000);

        // 初始化完成后显示同步状态
        setTimeout(function() {
            showBadge('☁ 已同步', 'success');
        }, 2000);
    </script>
</body>
</html>
