<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>复制评论 - 评论助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .container {
            background: white;
            padding: 30px 24px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 22px;
        }
        .count-badge {
            display: inline-block;
            background: #667eea20;
            color: #667eea;
            font-size: 13px;
            padding: 4px 14px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            line-height: 1.6;
            resize: none;
            margin-bottom: 16px;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 14px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        button:active {
            transform: scale(0.97);
        }
        button.secondary {
            background: #f0f0f0;
            color: #666;
            flex: 0.5;
        }
        .empty {
            color: #999;
            font-size: 16px;
            padding: 50px 0;
        }
        .empty p { margin-top: 8px; font-size: 14px; }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: #27ae60;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
            z-index: 999;
            opacity: 0;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .nav-links a {
            color: #888;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: #667eea; }
        .sync-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 1000;
        }
        .sync-badge.success { background: #27ae60; }
        .sync-badge.error { background: #e74c3c; }
        .sync-badge.loading { background: #f39c12; }
        @media (max-width: 400px) {
            .container { padding: 20px 16px; }
            h1 { font-size: 20px; }
            button { font-size: 15px; padding: 12px 16px; }
            textarea { min-height: 100px; }
        }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="sync-badge" id="syncBadge">☁ 同步中...</div>

    <div class="container">
        <h1>📋 复制评论</h1>
        <div class="count-badge" id="countBadge">
            📌 剩余 <strong id="remainingCount">0</strong> 条
        </div>

        <div id="contentArea">
            <!-- 动态内容 -->
        </div>

        <div class="nav-links">
            <a href="submit.html">去提交内容 →</a>
        </div>
    </div>

    <script>
        // ========== 配置 ==========
        const STORAGE_KEY = 'plzs_comments';
        const JSONBIN_API_KEY = '$2a$10$hj2L8dQlL6o5l8zMYi9dP.n3ILlEpJU14/irLt8TA9QI9AMiivvi6';
        // 固定的 binId - 所有设备共用这个 ID，实现真正的多设备同步
        const FIXED_BIN_ID = '6a4270e3f5f4af5e2941a479';
        // ==========================

        // ========== JSONBin 云同步 ==========
        async function cloudLoad() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${FIXED_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                if (!response.ok) throw new Error('加载失败');
                const result = await response.json();
                return result.record;
            } catch (e) {
                console.error('云加载失败:', e);
                return null;
            }
        }

        async function cloudSave(data) {
            try {
                // 直接保存明文数据（不用加密，简单可靠）
                await fetch(`https://api.jsonbin.io/v3/b/${FIXED_BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify({ comments: data, timestamp: Date.now() })
                });
                return true;
            } catch (e) {
                console.error('云保存失败:', e);
                return false;
            }
        }

        // ========== 本地存储 ==========
        function getComments() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            } catch (e) {
                return [];
            }
        }

        function saveComments(comments) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(comments));
        }

        // ========== UI ==========
        function showSyncBadge(text, type) {
            const badge = document.getElementById('syncBadge');
            badge.textContent = text;
            badge.className = 'sync-badge ' + type;
        }

        function showToast(text, isError) {
            const toast = document.getElementById('toast');
            toast.textContent = text;
            toast.style.background = isError ? '#e74c3c' : '#27ae60';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
        }

        async function copyComment() {
            const textArea = document.getElementById('commentText');
            if (!textArea) return;

            const text = textArea.value;

            const copyDone = async () => {
                showToast('✅ 已复制！');
                setTimeout(async () => {
                    const comments = getComments();
                    if (comments.length > 0) {
                        comments.shift();
                        saveComments(comments);
                        await cloudSave(comments);
                    }
                    loadNext();
                }, 600);
            };

            const copyFail = () => {
                fallbackCopy(textArea, copyDone);
            };

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(copyDone).catch(copyFail);
            } else {
                fallbackCopy(textArea, copyDone);
            }
        }

        function fallbackCopy(textArea, onSuccess) {
            textArea.select();
            textArea.setSelectionRange(0, 99999);
            if (document.execCommand('copy')) {
                onSuccess();
            } else {
                alert('复制失败，请手动选中文字后复制');
                textArea.select();
            }
        }

        async function skipComment() {
            const comments = getComments();
            if (comments.length > 0) {
                comments.shift();
                saveComments(comments);
                await cloudSave(comments);
            }
            showToast('⏭ 已跳过', false);
            setTimeout(() => loadNext(), 400);
        }

        function loadNext() {
            const comments = getComments();
            const contentArea = document.getElementById('contentArea');
            const remainingCount = document.getElementById('remainingCount');

            remainingCount.textContent = comments.length;

            if (comments.length === 0) {
                contentArea.innerHTML = `
                    <div class="empty">
                        <div style="font-size: 48px; margin-bottom: 10px;">📭</div>
                        <p>当前没有内容了</p>
                        <p style="font-size: 14px;">去"提交内容"页面添加新内容</p>
                    </div>
                `;
            } else {
                contentArea.innerHTML = `
                    <textarea id="commentText" readonly>${escapeHtml(comments[0])}</textarea>
                    <div class="btn-group">
                        <button onclick="copyComment()">📋 复制</button>
                        <button class="secondary" onclick="skipComment()">⏭ 跳过</button>
                    </div>
                `;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== 键盘快捷键 ==========
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                if (e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'INPUT') {
                    e.preventDefault();
                    copyComment();
                }
            }
        });

        // ========== 初始化 ==========
        async function init() {
            showSyncBadge('☁ 同步中...', 'loading');
            
            // 从云端加载数据
            const cloud = await cloudLoad();
            if (cloud && cloud.comments) {
                // 云端有数据，用云端的（覆盖本地）
                saveComments(cloud.comments);
            } else {
                // 云端没数据，把本地数据上传
                const localData = getComments();
                if (localData.length > 0) {
                    await cloudSave(localData);
                }
            }
            
            showSyncBadge('☁ 已同步', 'success');
            loadNext();
        }

        // 启动
        init();
    </script>
</body>
</html>
