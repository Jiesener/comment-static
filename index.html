<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>评论展示 - 评论助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .container {
            background: white; padding: 30px 24px; border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 500px; width: 100%;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 8px; font-size: 22px; }
        .device-id {
            font-size: 11px; color: #aaa; margin-bottom: 12px;
        }
        .count-badge {
            display: inline-block; background: #667eea20; color: #667eea;
            font-size: 13px; padding: 4px 14px; border-radius: 20px;
            margin-bottom: 20px; font-weight: 600;
        }
        textarea {
            width: 100%; min-height: 120px; padding: 15px;
            border: 2px solid #e0e0e0; border-radius: 12px;
            font-size: 16px; line-height: 1.6; resize: none;
            margin-bottom: 16px; font-family: inherit;
        }
        textarea:focus { outline: none; border-color: #667eea; }
        .btn-group { display: flex; gap: 10px; }
        button {
            flex: 1; padding: 14px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
        }
        button:active { transform: scale(0.97); }
        button.secondary { background: #f0f0f0; color: #666; flex: 0.5; }
        .empty { color: #999; font-size: 16px; padding: 50px 0; }
        .empty p { margin-top: 8px; font-size: 14px; }
        .toast {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: #27ae60; color: white; padding: 12px 24px;
            border-radius: 10px; font-weight: 600; font-size: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease; z-index: 999; opacity: 0;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .nav-links { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .nav-links a { color: #888; text-decoration: none; font-size: 14px; }
        .nav-links a:hover { color: #667eea; }
        .sync-badge {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.7); color: white;
            padding: 8px 16px; border-radius: 20px; font-size: 12px; z-index: 1000;
        }
        .sync-badge.success { background: #27ae60; }
        .sync-badge.error { background: #e74c3c; }
        .sync-badge.loading { background: #f39c12; }
        .sync-badge.syncing { background: #3498db; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="sync-badge" id="syncBadge">☁ 同步中...</div>

    <div class="container">
        <h1>📋 评论展示</h1>
        <div class="device-id" id="deviceIdDisplay"></div>
        <div class="count-badge">
            📌 剩余 <strong id="remainingCount">0</strong> 条未分配
        </div>
        <div id="contentArea"></div>
        <div class="nav-links">
            <a href="submit.html">去提交内容 →</a>
        </div>
    </div>

    <script>
        var API_KEY = '$2a$10$hj2L8dQlL6o5l8zMYi9dP.n3ILlEpJU14/irLt8TA9QI9AMiivvi6';
        var BIN_ID = '6a4270e3f5f4af5e2941a479';
        var DEVICE_KEY = 'plzs_device_id';

        // ========== 设备ID管理 ==========
        function getDeviceId() {
            var id = localStorage.getItem(DEVICE_KEY);
            if (!id) {
                id = 'device-' + Math.random().toString(36).substring(2, 10);
                localStorage.setItem(DEVICE_KEY, id);
            }
            return id;
        }

        var myDeviceId = getDeviceId();
        document.getElementById('deviceIdDisplay').textContent = '📱 设备: ' + myDeviceId;

        // ========== 工具函数 ==========
        function showBadge(text, type) {
            var b = document.getElementById('syncBadge');
            b.textContent = text;
            b.className = 'sync-badge ' + type;
        }

        function showToast(text) {
            var t = document.getElementById('toast');
            t.textContent = text;
            t.classList.add('show');
            setTimeout(function() { t.classList.remove('show'); }, 1500);
        }

        function escapeHtml(text) {
            var d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        // ========== 云端操作 ==========
        function cloudLoad() {
            return fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest', {
                headers: { 'X-Master-Key': API_KEY }
            }).then(function(r) { return r.json(); })
              .then(function(d) {
                  if (d.record) return d.record;
                  return { comments: [], assignments: {}, timestamp: 0 };
              }).catch(function() {
                  return null;
              });
        }

        function cloudSave(data) {
            data.timestamp = Date.now();
            return fetch('https://api.jsonbin.io/v3/b/' + BIN_ID, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify(data)
            }).then(function(r) { return r.json(); })
              .then(function() { return true; })
              .catch(function() { return false; });
        }

        // ========== 核心逻辑 ==========
        var cloudData = null;
        var myComment = null;

        function render() {
            var area = document.getElementById('contentArea');
            var count = document.getElementById('remainingCount');

            if (cloudData) {
                var unassigned = cloudData.comments.filter(function(c) {
                    return !Object.values(cloudData.assignments).includes(c);
                });
                count.textContent = unassigned.length;
            }

            if (!myComment) {
                area.innerHTML = '<div class="empty"><div style="font-size:48px;margin-bottom:10px">📭</div><p>没有更多评论了</p><p style="font-size:14px">等待提交新内容...</p></div>';
            } else {
                area.innerHTML = '<textarea id="commentText" readonly>' + escapeHtml(myComment) + '</textarea><div class="btn-group"><button onclick="doCopy()">📋 复制</button><button class="secondary" onclick="doSkip()">⏭ 跳过</button></div>';
            }
        }

        function syncFromCloud() {
            return cloudLoad().then(function(data) {
                if (!data) return;
                cloudData = data;

                // 确保 assignments 和 comments 存在
                if (!cloudData.assignments) cloudData.assignments = {};
                if (!cloudData.comments) cloudData.comments = [];

                // 检查当前设备是否已分配
                var assigned = cloudData.assignments[myDeviceId];

                if (assigned && cloudData.comments.indexOf(assigned) >= 0) {
                    // 已分配且评论还存在
                    myComment = assigned;
                } else if (assigned) {
                    // 已分配但评论不存在（被其他人删了），重新分配
                    delete cloudData.assignments[myDeviceId];
                    myComment = assignRandom();
                } else {
                    // 未分配，随机分配一条
                    myComment = assignRandom();
                }

                render();
            });
        }

        function assignRandom() {
            // 找出未分配的评论
            var assignedComments = Object.values(cloudData.assignments);
            var unassigned = cloudData.comments.filter(function(c) {
                return assignedComments.indexOf(c) < 0;
            });

            if (unassigned.length === 0) return null;

            // 随机选一条
            var randomIndex = Math.floor(Math.random() * unassigned.length);
            var chosen = unassigned[randomIndex];

            // 分配给当前设备
            cloudData.assignments[myDeviceId] = chosen;
            cloudSave(cloudData);

            return chosen;
        }

        function doCopy() {
            var ta = document.getElementById('commentText');
            if (!ta) return;

            var text = ta.value;

            function afterCopy() {
                showToast('✅ 已复制！');

                // 从评论列表中删除
                var idx = cloudData.comments.indexOf(text);
                if (idx >= 0) {
                    cloudData.comments.splice(idx, 1);
                }
                // 删除分配记录
                delete cloudData.assignments[myDeviceId];
                myComment = null;

                cloudSave(cloudData).then(function() {
                    // 重新分配一条新的
                    syncFromCloud();
                });
            }

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(afterCopy).catch(function() {
                    ta.select(); document.execCommand('copy'); afterCopy();
                });
            } else {
                ta.select(); document.execCommand('copy'); afterCopy();
            }
        }

        function doSkip() {
            // 删除分配记录，但不删除评论本身（让给别人）
            delete cloudData.assignments[myDeviceId];
            myComment = null;

            cloudSave(cloudData).then(function() {
                showToast('⏭ 已跳过，换一条');
                syncFromCloud();
            });
        }

        // ========== 启动 ==========
        showBadge('☁ 同步中...', 'loading');
        syncFromCloud().then(function() {
            showBadge('☁ 已同步', 'success');
        });

        // 每 5 秒轮询
        setInterval(function() {
            showBadge('🔄 同步中...', 'syncing');
            syncFromCloud().then(function() {
                showBadge('☁ 已同步', 'success');
            });
        }, 5000);
    </script>
</body>
</html>
