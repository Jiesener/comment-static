<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>评论展示 - 评论助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .container {
            background: white; padding: 30px 24px; border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 500px; width: 100%;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 8px; font-size: 22px; }
        .device-id { font-size: 11px; color: #aaa; margin-bottom: 12px; }
        .count-badge {
            display: inline-block; background: #667eea20; color: #667eea;
            font-size: 13px; padding: 4px 14px; border-radius: 20px;
            margin-bottom: 20px; font-weight: 600;
        }
        textarea {
            width: 100%; min-height: 120px; padding: 15px;
            border: 2px solid #e0e0e0; border-radius: 12px;
            font-size: 16px; line-height: 1.6; resize: none;
            margin-bottom: 16px; font-family: inherit;
        }
        textarea:focus { outline: none; border-color: #667eea; }
        .btn-group { display: flex; gap: 10px; }
        button {
            flex: 1; padding: 14px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
        }
        button:active { transform: scale(0.97); }
        button.secondary { background: #f0f0f0; color: #666; flex: 0.5; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .empty { color: #999; font-size: 16px; padding: 50px 0; }
        .empty p { margin-top: 8px; font-size: 14px; }
        .loading { color: #667eea; font-size: 16px; padding: 50px 0; }
        .toast {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: #27ae60; color: white; padding: 12px 24px;
            border-radius: 10px; font-weight: 600; font-size: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease; z-index: 999; opacity: 0;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .nav-links { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .nav-links a { color: #888; text-decoration: none; font-size: 14px; }
        .nav-links a:hover { color: #667eea; }
        .sync-badge {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.7); color: white;
            padding: 8px 16px; border-radius: 20px; font-size: 12px; z-index: 1000;
        }
        .sync-badge.success { background: #27ae60; }
        .sync-badge.error { background: #e74c3c; }
        .sync-badge.loading { background: #f39c12; }
        .sync-badge.syncing { background: #3498db; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="sync-badge" id="syncBadge">☁ 分配中...</div>

    <div class="container">
        <h1>📋 评论展示</h1>
        <div class="device-id" id="deviceIdDisplay"></div>
        <div class="count-badge">
            📌 剩余 <strong id="remainingCount">0</strong> 条
        </div>
        <div id="contentArea">
            <div class="loading">⏳ 正在分配评论...</div>
        </div>
        <div class="nav-links">
            <a href="submit.html">去提交内容 →</a>
        </div>
    </div>

    <script>
        var API_KEY = '$2a$10$hj2L8dQlL6o5l8zMYi9dP.n3ILlEpJU14/irLt8TA9QI9AMiivvi6';
        var BIN_ID = '6a4270e3f5f4af5e2941a479';
        var DEVICE_KEY = 'plzs_device_id';

        // ========== 设备ID ==========
        function getDeviceId() {
            var id = localStorage.getItem(DEVICE_KEY);
            if (!id) {
                id = 'd' + Math.random().toString(36).substring(2, 8);
                localStorage.setItem(DEVICE_KEY, id);
            }
            return id;
        }

        var myDeviceId = getDeviceId();
        document.getElementById('deviceIdDisplay').textContent = '📱 ' + myDeviceId;

        // ========== 工具函数 ==========
        function showBadge(text, type) {
            var b = document.getElementById('syncBadge');
            b.textContent = text;
            b.className = 'sync-badge ' + type;
        }

        function showToast(text) {
            var t = document.getElementById('toast');
            t.textContent = text;
            t.classList.add('show');
            setTimeout(function() { t.classList.remove('show'); }, 1500);
        }

        function escapeHtml(text) {
            var d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        // ========== 云端操作 ==========
        function cloudLoad() {
            return fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest', {
                headers: { 'X-Master-Key': API_KEY }
            }).then(function(r) { return r.json(); })
              .then(function(d) {
                  if (d.record) return d.record;
                  return { comments: [], assignments: {}, nextIndex: 0, timestamp: 0 };
              }).catch(function() { return null; });
        }

        function cloudSave(data) {
            data.timestamp = Date.now();
            return fetch('https://api.jsonbin.io/v3/b/' + BIN_ID, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify(data)
            }).then(function(r) { return r.json(); })
              .then(function() { return true; })
              .catch(function() { return false; });
        }

        // ========== 核心逻辑：claim-and-verify ==========
        var myComment = null;
        var cloudData = null;
        var isOperating = false;

        function render() {
            var area = document.getElementById('contentArea');
            var count = document.getElementById('remainingCount');

            if (cloudData) {
                var assignedComments = Object.values(cloudData.assignments);
                var unassigned = cloudData.comments.filter(function(c) {
                    return assignedComments.indexOf(c) < 0;
                });
                count.textContent = unassigned.length;
            }

            if (!myComment) {
                area.innerHTML = '<div class="empty"><div style="font-size:48px;margin-bottom:10px">📭</div><p>没有更多评论了</p><p style="font-size:14px">等待提交新内容...</p></div>';
            } else {
                area.innerHTML = '<textarea id="commentText" readonly>' + escapeHtml(myComment) + '</textarea><div class="btn-group"><button onclick="doCopy()">📋 复制</button><button class="secondary" onclick="doSkip()">⏭ 跳过</button></div>';
            }
        }

        // 核心：claim-and-verify 分配算法
        // 1. 加载云端数据
        // 2. 找到未分配的评论
        // 3. 认领一条（保存）
        // 4. 立即验证（重新加载）
        // 5. 如果验证失败，重试（最多10次）
        function claimComment() {
            return cloudLoad().then(function(data) {
                if (!data) return null;
                cloudData = data;
                if (!cloudData.assignments) cloudData.assignments = {};
                if (!cloudData.comments) cloudData.comments = [];
                if (!cloudData.nextIndex) cloudData.nextIndex = 0;

                // 检查是否已分配
                var myAssigned = cloudData.assignments[myDeviceId];
                if (myAssigned && cloudData.comments.indexOf(myAssigned) >= 0) {
                    return myAssigned; // 已分配，直接返回
                }

                // 找未分配的评论
                var assignedComments = Object.values(cloudData.assignments);
                var unassigned = cloudData.comments.filter(function(c) {
                    return assignedComments.indexOf(c) < 0;
                });

                if (unassigned.length === 0) return null;

                // 使用 nextIndex 确保顺序分配，避免随机冲突
                var idx = cloudData.nextIndex % unassigned.length;
                var chosen = unassigned[idx];

                // 认领
                cloudData.assignments[myDeviceId] = chosen;
                cloudData.nextIndex = (cloudData.nextIndex + 1) % cloudData.comments.length;

                // 保存
                return cloudSave(cloudData).then(function() {
                    return chosen;
                });
            });
        }

        // 验证分配是否有效
        function verifyAssignment() {
            return cloudLoad().then(function(data) {
                if (!data || !data.assignments) return false;
                cloudData = data;
                var myAssigned = cloudData.assignments[myDeviceId];
                return (myAssigned === myComment);
            });
        }

        // 初始化：claim-and-verify 循环
        function initAssignment() {
            showBadge('☁ 分配中...', 'loading');

            var attempts = 0;
            var maxAttempts = 20;

            function tryAssign() {
                attempts++;
                claimComment().then(function(chosen) {
                    if (!chosen) {
                        // 没有更多评论
                        myComment = null;
                        render();
                        showBadge('📭 已用完', 'success');
                        return;
                    }

                    myComment = chosen;
                    render();

                    // 立即验证
                    setTimeout(function() {
                        verifyAssignment().then(function(valid) {
                            if (valid) {
                                showBadge('☁ 已分配', 'success');
                            } else if (attempts < maxAttempts) {
                                // 冲突，重试
                                showBadge('🔄 重新分配...', 'syncing');
                                tryAssign();
                            } else {
                                showBadge('☁ 已分配(可能有冲突)', 'success');
                            }
                        });
                    }, 300); // 等300ms让保存生效
                });
            }

            tryAssign();
        }

        // 复制/跳过后重新分配
        function doCopy() {
            if (isOperating || !myComment) return;
            isOperating = true;

            var ta = document.getElementById('commentText');
            if (!ta) { isOperating = false; return; }

            var text = ta.value;

            function afterCopy() {
                showToast('✅ 已复制！');

                // 删除评论和分配
                var idx = cloudData.comments.indexOf(text);
                if (idx >= 0) cloudData.comments.splice(idx, 1);
                delete cloudData.assignments[myDeviceId];
                myComment = null;

                cloudSave(cloudData).then(function() {
                    initAssignment().then(function() {
                        isOperating = false;
                    });
                    isOperating = false;
                });
            }

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(afterCopy).catch(function() {
                    ta.select(); document.execCommand('copy'); afterCopy();
                });
            } else {
                ta.select(); document.execCommand('copy'); afterCopy();
            }
        }

        function doSkip() {
            if (isOperating) return;
            isOperating = true;

            delete cloudData.assignments[myDeviceId];
            myComment = null;

            cloudSave(cloudData).then(function() {
                showToast('⏭ 已跳过');
                initAssignment().then(function() {
                    isOperating = false;
                });
                isOperating = false;
            });
        }

        // ========== 启动 ==========
        initAssignment();

        // 每 2 秒轮询验证
        setInterval(function() {
            if (myComment && !isOperating) {
                verifyAssignment().then(function(valid) {
                    if (!valid && myComment) {
                        // 分配被覆盖，重新分配
                        initAssignment();
                    }
                });
            }
        }, 2000);
    </script>
</body>
</html>
