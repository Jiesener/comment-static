<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>评论展示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.box{background:#fff;padding:30px 24px;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:500px;width:100%;text-align:center}
h1{color:#333;margin-bottom:12px;font-size:22px}
.info{font-size:12px;color:#aaa;margin-bottom:16px}
.badge{display:inline-block;background:rgba(102,126,234,.12);color:#667eea;font-size:13px;padding:4px 14px;border-radius:20px;margin-bottom:20px;font-weight:600}
textarea{width:100%;min-height:120px;padding:15px;border:2px solid #e0e0e0;border-radius:12px;font-size:16px;line-height:1.6;resize:none;margin-bottom:16px;font-family:inherit}
.btns{display:flex;gap:10px}
button{flex:1;padding:14px 20px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer}
button:active{transform:scale(.97)}
button.sec{background:#f0f0f0;color:#666;flex:.5}
button:disabled{opacity:.4;cursor:not-allowed}
.empty{color:#999;font-size:16px;padding:50px 0}
.empty p{margin-top:8px;font-size:14px}
.loading{color:#667eea;font-size:16px;padding:50px 0}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:#27ae60;color:#fff;padding:12px 24px;border-radius:10px;font-weight:600;font-size:15px;box-shadow:0 8px 30px rgba(0,0,0,.2);transition:transform .3s;z-index:999;opacity:0}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.nav{display:flex;justify-content:center;gap:20px;margin-top:20px}
.nav a{color:#888;text-decoration:none;font-size:14px}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="box">
<h1>📋 评论展示</h1>
<div class="info" id="info"></div>
<div class="badge">📌 剩余 <strong id="cnt">0</strong> 条</div>
<div id="area"><div class="loading">⏳ 加载中...</div></div>
<div class="nav"><a href="submit.html">去提交内容 →</a></div>
</div>

<script>
var AK='$2a$10$mN/qxmnMyWObfCIw7cZokuvM1jSfeZ7u1zLt8yqTLlaMztS3hsvqm';
var BIN='6a4490d2da38895dfe198314';
var DK='plzs_device_id';
var DEVID=localStorage.getItem(DK);
if(!DEVID){DEVID='d'+Math.random().toString(36).slice(2,8);localStorage.setItem(DK,DEVID)}
document.getElementById('info').textContent='📱 '+DEVID;

function toast(t){var e=document.getElementById('toast');e.textContent=t;e.classList.add('show');setTimeout(function(){e.classList.remove('show')},1500)}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

function jLoad(){
    return fetch('https://api.jsonbin.io/v3/b/'+BIN+'/latest?nocache='+Date.now(),{cache:'no-store'})
    .then(function(r){return r.json()})
    .then(function(d){return(d.record||{}).comments||[]})
    .catch(function(){return null});
}

function jSave(comments){
    return fetch('https://api.jsonbin.io/v3/b/'+BIN,{
        method:'PUT',
        headers:{'Content-Type':'application/json','X-Master-Key':AK},
        body:JSON.stringify({comments:comments})
    }).then(function(){return true}).catch(function(){return false});
}

var CUR=null,BUSY=false;

function render(remaining){
    document.getElementById('cnt').textContent=remaining||0;
    var b=document.getElementById('area');
    if(!CUR){
        b.innerHTML='<div class="empty"><div style="font-size:48px;margin-bottom:10px">📭</div><p>没有更多评论了</p></div>';
    }else{
        b.innerHTML='<textarea id="ta" readonly>'+esc(CUR)+'</textarea><div class="btns"><button id="copyBtn">📋 复制</button><button class="sec" id="skipBtn">⏭ 跳过</button></div>';
        document.getElementById('copyBtn').onclick=doCopy;
        document.getElementById('skipBtn').onclick=doSkip;
    }
}

// 核心：从评论池随机拿一条（带重试防冲突）
async function pickOne(){
    for(var i=0;i<20;i++){
        var comments=await jLoad();
        if(comments===null){await new Promise(function(r){setTimeout(r,200)});continue}
        if(comments.length===0){CUR=null;render(0);return false}

        // 随机选一条
        var idx=Math.floor(Math.random()*comments.length);
        var picked=comments[idx];

        // 从数组删除
        comments.splice(idx,1);

        // 保存
        if(await jSave(comments)){
            CUR=picked;render(comments.length);return true;
        }

        // 保存失败（冲突），重试
        await new Promise(function(r){setTimeout(r,50)});
    }
    CUR=null;render(0);return false;
}

// 复制：已经删除了，直接用新的
async function doCopy(){
    if(BUSY||!CUR)return;
    BUSY=true;
    var btn=document.getElementById('copyBtn');
    if(btn)btn.disabled=true;
    var text=CUR;

    try{
        if(navigator.clipboard&&navigator.clipboard.writeText){await navigator.clipboard.writeText(text)}
        else{var ta=document.getElementById('ta');if(ta){ta.select();document.execCommand('copy')}}
        toast('✅ 已复制！');
    }catch(e){toast('⚠️ 复制失败');BUSY=false;if(btn)btn.disabled=false;return}

    // 直接拿下一个
    await pickOne();
    BUSY=false;
}

// 跳过：把当前评论放回末尾，拿下一个
async function doSkip(){
    if(BUSY)return;
    BUSY=true;

    for(var i=0;i<10;i++){
        var comments=await jLoad();
        if(comments===null){await new Promise(function(r){setTimeout(r,200)});continue}

        // 把跳过的评论追加到末尾
        comments.push(CUR);

        // 随机选一条不同的
        if(comments.length===1){
            CUR=comments[0];comments.pop();render(0);
            if(await jSave(comments)){break}
        }else{
            var idx=Math.floor(Math.random()*(comments.length-1)); // 不选最后那个
            var picked=comments[idx];
            comments.splice(idx,1);

            if(await jSave(comments)){
                CUR=picked;render(comments.length);break;
            }
        }
        await new Promise(function(r){setTimeout(r,50)});
    }

    toast('⏭ 已跳过');
    BUSY=false;
}

pickOne();
</script>
</body>
</html>
