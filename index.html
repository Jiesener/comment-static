<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>评论展示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.box{background:#fff;padding:30px 24px;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:500px;width:100%;text-align:center}
h1{color:#333;margin-bottom:12px;font-size:22px}
.info{font-size:12px;color:#aaa;margin-bottom:16px}
.badge{display:inline-block;background:rgba(102,126,234,.12);color:#667eea;font-size:13px;padding:4px 14px;border-radius:20px;margin-bottom:20px;font-weight:600}
textarea{width:100%;min-height:120px;padding:15px;border:2px solid #e0e0e0;border-radius:12px;font-size:16px;line-height:1.6;resize:none;margin-bottom:16px;font-family:inherit}
.btns{display:flex;gap:10px}
button{flex:1;padding:14px 20px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer}
button:active{transform:scale(.97)}
button.sec{background:#f0f0f0;color:#666;flex:.5}
button:disabled{opacity:.4;cursor:not-allowed}
.empty{color:#999;font-size:16px;padding:50px 0}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:#27ae60;color:#fff;padding:12px 24px;border-radius:10px;font-weight:600;font-size:15px;box-shadow:0 8px 30px rgba(0,0,0,.2);transition:transform .3s;z-index:999;opacity:0}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.nav{display:flex;justify-content:center;gap:20px;margin-top:20px}
.nav a{color:#888;text-decoration:none;font-size:14px}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="box">
<h1>📋 评论展示</h1>
<div class="info" id="info"></div>
<div class="badge">📌 剩余 <strong id="cnt">0</strong> 条</div>
<div id="area"><div class="empty"><div style="font-size:48px">📭</div><p>加载中...</p></div></div>
<div class="nav"><a href="submit.html">去提交内容 →</a></div>
</div>

<script>
var TOKEN=['github_pat_11ARP77YI0','k8RWakgd5Mtt_nK97kftwfqKEMd0XnGm93GLZiKllBk4uFkPmzS5TJ3wGP7PLXJ78xwAbBXm'].join('');
var REPO='Jiesener/comment-static';
var FILE='data.json';

// 设备 ID
var DK='plzs_device_id';
var DEVID=localStorage.getItem(DK);
if(!DEVID){DEVID='d'+Math.random().toString(36).slice(2,8);localStorage.setItem(DK,DEVID)}
document.getElementById('info').textContent='📱 '+DEVID;

function toast(t){var e=document.getElementById('toast');e.textContent=t;e.classList.add('show');setTimeout(function(){e.classList.remove('show')},1500)}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

// 简单正整数哈希
function hash(s){var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return Math.abs(h)}

// 加载数据
function loadAll(){
    return fetch('https://api.github.com/repos/'+REPO+'/contents/'+FILE,{
        headers:{'Authorization':'token '+TOKEN,'Accept':'application/vnd.github+json'}
    })
    .then(function(r){
        if(!r.ok)return null;
        return r.json().then(function(d){
            if(!d.content)return null;
            var obj=JSON.parse(decodeURIComponent(escape(atob(d.content))));
            return {sha:d.sha,comments:obj.comments||[],assignments:obj.assignments||{}};
        });
    })
    .catch(function(){return null});
}

// 保存（异步，不阻塞）
function saveAsync(comments, assignments){
    return fetch('https://api.github.com/repos/'+REPO+'/contents/'+FILE,{
        headers:{'Authorization':'token '+TOKEN,'Accept':'application/vnd.github+json'}
    })
    .then(function(r){return r.json()})
    .then(function(d){
        var sha=d.sha||'';
        var content=btoa(unescape(encodeURIComponent(JSON.stringify({comments:comments,assignments:assignments}))));
        return fetch('https://api.github.com/repos/'+REPO+'/contents/'+FILE,{
            method:'PUT',
            headers:{'Authorization':'token '+TOKEN,'Content-Type':'text/plain;charset=UTF-8'},
            body:JSON.stringify({message:'update',content:content,sha:sha})
        });
    })
    .then(function(r){return r.ok})
    .catch(function(){return false});
}

var CUR=null,BUSY=false;

function render(remaining){
    document.getElementById('cnt').textContent=remaining||0;
    var b=document.getElementById('area');
    if(!CUR){
        b.innerHTML='<div class="empty"><div style="font-size:48px;margin-bottom:10px">📭</div><p>没有更多评论了</p></div>';
    }else{
        b.innerHTML='<textarea id="ta" readonly>'+esc(CUR)+'</textarea><div class="btns"><button id="copyBtn">📋 复制</button><button class="sec" id="skipBtn">⏭ 跳过</button></div>';
        document.getElementById('copyBtn').onclick=doCopy;
        document.getElementById('skipBtn').onclick=doSkip;
    }
}

// ★ 核心：读数据 → 释放旧分配 → 哈希选新 → 立即显示（不存）
async function pick(){
    var d=await loadAll();
    if(!d||!d.comments.length){CUR=null;render(0);return}

    var comments=d.comments;
    var assignments=d.assignments||{};

    // 释放我的旧分配
    delete assignments[DEVID];

    // 找未分配的
    var assigned=Object.values(assignments);
    var unassigned=comments.filter(function(x){return assigned.indexOf(x)<0});

    // 哈希选一条
    var pool=unassigned.length?unassigned:comments;
    var idx=hash(DEVID+Date.now())%pool.length;
    CUR=pool[idx];

    // 立即显示
    render(unassigned.length||comments.length-Object.keys(assignments).length);
}

// 复制：删除评论 + 保存 + 分配下一条
async function doCopy(){
    if(BUSY||!CUR)return;
    BUSY=true;
    var btn=document.getElementById('copyBtn');if(btn)btn.disabled=true;

    try{
        if(navigator.clipboard&&navigator.clipboard.writeText){await navigator.clipboard.writeText(CUR)}
        else{var ta=document.getElementById('ta');if(ta){ta.select();document.execCommand('copy')}}
        toast('✅ 已复制！');
    }catch(e){toast('⚠️ 复制失败');BUSY=false;if(btn)btn.disabled=false;return}

    var old=CUR;
    CUR=null;

    for(var i=0;i<5;i++){
        var d=await loadAll();
        if(!d){await new Promise(function(r){setTimeout(r,200)});continue}
        var idx=d.comments.indexOf(old);
        if(idx>=0)d.comments.splice(idx,1);  // 永久删除
        delete d.assignments[DEVID];
        var a=Object.values(d.assignments);
        var u=d.comments.filter(function(x){return a.indexOf(x)<0});
        if(u.length){var p=u[hash(DEVID+Date.now())%u.length];d.assignments[DEVID]=p;CUR=p}
        else{CUR=null}
        if(await saveAsync(d.comments,d.assignments)){render(d.comments.length-Object.keys(d.assignments).length);break}
    }
    if(!CUR)render(0);
    BUSY=false;
}

// 跳过：释放当前 + 保存 + 分配下一条
async function doSkip(){
    if(BUSY)return;
    BUSY=true;
    CUR=null;
    for(var i=0;i<5;i++){
        var d=await loadAll();
        if(!d){await new Promise(function(r){setTimeout(r,200)});continue}
        delete d.assignments[DEVID];
        var a=Object.values(d.assignments);
        var u=d.comments.filter(function(x){return a.indexOf(x)<0});
        if(u.length){var p=u[hash(DEVID+Date.now())%u.length];d.assignments[DEVID]=p;CUR=p}
        else{CUR=null}
        if(await saveAsync(d.comments,d.assignments)){render(d.comments.length-Object.keys(d.assignments).length);break}
    }
    if(!CUR)render(0);
    toast('⏭ 已跳过');
    BUSY=false;
}

pick();
</script>
</body>
</html>
